# Example YAML config for benchmark/kernels/quantization/bench_decode_int_kv.py
#
# Run with:
#   python bench_decode_int_kv.py --config bench_decode_int_kv.example.yaml
#
# Each entry in `cases` becomes one row in the output table.  Per-case fields
# override the values in `defaults`.

defaults:
  model: Qwen/Qwen3-8B
  batch_size: 128
  max_kv_splits: 8
  warmup: 2
  repeat: 5
  hp_prefix: 32
  hp_recent: 128
  profiling_mode: torch_profiler
  no_correctness: false

cases:
  # =========================================================================
  # seq_len = 8 k
  # =========================================================================
  - {id: 11, seq_len: 8192,   backend: triton_bf16}
  - {id: 12, seq_len: 8192,   backend: flashinfer_bf16,                 baseline_id: 11}
  - {id: 14, seq_len: 8192,   backend: int2,  group_size: 0,            baseline_id: 11}
  - {id: 15, seq_len: 8192,   backend: int2,  group_size: 64,       mixed_kv: false,    baseline_id: 11}
  - {id: 16, seq_len: 8192,   backend: int2,  group_size: 0,       mixed_kv: true,    baseline_id: 11}
  - {id: 17, seq_len: 8192,   backend: int2,  group_size: 64,       mixed_kv: true,    baseline_id: 11}

  # # =========================================================================
  # # seq_len = 16 k
  # # =========================================================================
